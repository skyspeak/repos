kind = "web"
previewPath = "/"
title = "AI Disruption Heatmap"
version = "1.0.0"
id = "artifacts/heatmap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25028

[services.development]
run = "pnpm --filter @workspace/heatmap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heatmap", "run", "build" ]
publicDir = "artifacts/heatmap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25028"
BASE_PATH = "/"
